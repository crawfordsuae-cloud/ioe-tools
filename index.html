<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IOE Energy Assessment Tool</title>

<style>

body{
  margin:0;
  padding:40px;
  background:#050816;
  color:white;
  font-family:Arial,sans-serif;
}

.container{
  max-width:1400px;
  margin:auto;
}

h1{
  font-size:52px;
  margin-bottom:10px;
}

.subtitle{
  color:#9aa4bf;
  font-size:20px;
  margin-bottom:40px;
}

.upload-box{
  background:#11182d;
  border:1px solid #1f2b4d;
  border-radius:20px;
  padding:40px;
  margin-bottom:40px;
}

button{
  margin-top:20px;
  background:#2563eb;
  color:white;
  border:none;
  padding:16px 30px;
  border-radius:12px;
  font-size:18px;
  cursor:pointer;
}

button:hover{
  background:#1d4ed8;
}

.card{
  background:#11182d;
  border:1px solid #1f2b4d;
  border-radius:20px;
  padding:30px;
  margin-bottom:30px;
}

.measure{
  background:#1a2442;
  border-radius:16px;
  padding:20px;
  margin-top:20px;
}

.loading{
  color:#60a5fa;
  font-size:22px;
}

.error{
  color:red;
}

input,select{
  padding:12px;
  border-radius:10px;
  border:none;
  margin-top:10px;
  width:100%;
}

</style>

</head>

<body>

<div class="container">

<h1>IOE Energy Assessment Tool</h1>

<p class="subtitle">

Upload Existing RdSAP Summary Worksheet or PAS2035 Assessment

</p>

<div class="upload-box">

<input type="file" id="fileInput">

<br>

<button onclick="uploadDocument()">

Process Document

</button>

</div>

<div id="results"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<script>

async function uploadDocument(){

  const file =
    document.getElementById(
      "fileInput"
    ).files[0];

  if(!file){

    alert("Select PDF");

    return;
  }

  document.getElementById(
    "results"
  ).innerHTML = `

    <div class="card">

      <h2>Processing...</h2>

      <p class="loading">

        Extracting RdSAP data

      </p>

    </div>

  `;

  try{

    const arrayBuffer =
      await file.arrayBuffer();

    const pdf =
      await pdfjsLib.getDocument({
        data:arrayBuffer
      }).promise;

    let extractedText = "";

    for(let page = 1;
        page <= pdf.numPages;
        page++){

      const currentPage =
        await pdf.getPage(page);

      const textContent =
        await currentPage.getTextContent();

      const strings =
        textContent.items.map(
          item => item.str
        );

      extractedText +=
        strings.join(" ");

    }

    const response =
      await fetch(
        "https://holy-base-2564.crawfordsuae.workers.dev",
        {
          method:"POST",

          headers:{
            "Content-Type":"application/json"
          },

          body:JSON.stringify({
            text:extractedText
          })
        }
      );

    const data =
      await response.json();

    document.title =
      data.address ||
      "IOE Assessment";

    document.getElementById(
      "results"
    ).innerHTML = `

      <div class="card">

        <h2>Property Details</h2>

        <p><strong>Address:</strong>
        ${data.address || "Not Found"}</p>

        <p><strong>Total Floor Area:</strong>
        ${data.totalFloorArea || "0"} m²</p>

        <p><strong>Heat Loss Perimeter:</strong>
        ${data.heatLossPerimeter || "0"} m</p>

        <p><strong>Room Height:</strong>
        ${data.roomHeight || "0"} m</p>

        <p><strong>Roof Area:</strong>
        ${data.roofArea || "0"} m²</p>

        <p><strong>Window Area:</strong>
        ${data.windowArea || "0"} m²</p>

        <p><strong>Current Fuel Cost:</strong>
        £${data.currentFuelCost || "0"}</p>

        <p><strong>Current Carbon:</strong>
        ${data.currentCarbon || "0"} T</p>

        <p><strong>Current Rating:</strong>
        ${data.currentRating || "-"}</p>

      </div>

      <div class="card">

        <h2>Select Measure</h2>

        <select id="measureSelect">

          ${
            data.measures.map(
              (measure,index)=>`

              <option value="${index}">

                ${measure.name}

              </option>

            `
            ).join("")
          }

        </select>

        <button onclick='showMeasure(${JSON.stringify(data.measures)})'>

          Calculate

        </button>

      </div>

      <div id="measureResults"></div>

    `;

  }

  catch(error){

    document.getElementById(
      "results"
    ).innerHTML = `

      <div class="card">

        <h2>Backend Error</h2>

        <p class="error">

          ${error}

        </p>

      </div>

    `;
  }

}

function showMeasure(measures){

  const index =
    document.getElementById(
      "measureSelect"
    ).value;

  const measure =
    measures[index];

  document.getElementById(
    "measureResults"
  ).innerHTML = `

    <div class="card">

      <h2>
      ${measure.name}
      </h2>

      <p>
      <strong>Total Installation Cost:</strong>
      £${measure.cost}
      </p>

      <p>
      <strong>${measure.risk}</strong>
      </p>

      <p>
      <strong>Additional Information Required:</strong>
      ${measure.additional.join(", ")}
      </p>

    </div>

  `;
}

</script>

</body>

</html>
