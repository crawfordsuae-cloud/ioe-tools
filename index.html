<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>IOE Energy Assessment Tool</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<style>

body{
  background:#020b2d;
  color:white;
  font-family:Arial;
  padding:40px;
}

.card{
  background:#0d173d;
  border-radius:20px;
  padding:40px;
  margin-bottom:30px;
}

button{
  background:#2f6df6;
  color:white;
  border:none;
  padding:20px 40px;
  border-radius:15px;
  font-size:30px;
  cursor:pointer;
}

h1{
  font-size:52px;
}

h2{
  font-size:42px;
}

p{
  font-size:32px;
  line-height:1.8;
}

</style>

</head>

<body>

<div class="card">

<h1>
Upload Existing RdSAP Summary Worksheet or PAS2035 Assessment
</h1>

<br><br>

<input type="file" id="file">

<br><br><br>

<button onclick="processDocument()">
Process Document
</button>

</div>

<div class="card" id="results">

<h2>Property Details</h2>

<p id="address"></p>
<p id="floor"></p>
<p id="heat"></p>
<p id="room"></p>
<p id="roof"></p>
<p id="window"></p>
<p id="fuel"></p>
<p id="carbon"></p>
<p id="rating"></p>

</div>

<script>

async function processDocument(){

  const file =
    document.getElementById("file").files[0];

  if(!file){
    alert("Choose PDF");
    return;
  }

  try{

    const arrayBuffer =
      await file.arrayBuffer();

    const pdf =
      await pdfjsLib.getDocument({
        data:arrayBuffer
      }).promise;

    let text = "";

    for(let i=1;i<=pdf.numPages;i++){

      const page =
        await pdf.getPage(i);

      const content =
        await page.getTextContent();

      text += content.items
        .map(item => item.str)
        .join(" ");

    }

    console.log(text);

    alert(text.substring(0,3000));

    const response =
      await fetch(
        "https://holy-base-2564.crawfordsuae.workers.dev",
        {
          method:"POST",

          headers:{
            "Content-Type":"application/json"
          },

          body:JSON.stringify({
            text:text
          })
        }
      );

    const data =
      await response.json();

    document.getElementById("address").innerHTML =
      "<b>Address:</b> " + data.address;

    document.getElementById("floor").innerHTML =
      "<b>Total Floor Area:</b> " +
      data.totalFloorArea + " m²";

    document.getElementById("heat").innerHTML =
      "<b>Heat Loss Perimeter:</b> " +
      data.heatLossPerimeter + " m";

    document.getElementById("room").innerHTML =
      "<b>Room Height:</b> " +
      data.roomHeight + " m";

    document.getElementById("roof").innerHTML =
      "<b>Roof Area:</b> " +
      data.roofArea + " m²";

    document.getElementById("window").innerHTML =
      "<b>Window Area:</b> " +
      data.windowArea + " m²";

    document.getElementById("fuel").innerHTML =
      "<b>Current Fuel Cost:</b> £" +
      data.fuelCost;

    document.getElementById("carbon").innerHTML =
      "<b>Current Carbon:</b> " +
      data.carbon + " T";

    document.getElementById("rating").innerHTML =
      "<b>Current Rating:</b> " +
      data.currentRating;

  }

  catch(error){

    document.getElementById("results").innerHTML =
      "<h2>Backend Error</h2><p>" +
      error +
      "</p>";

  }

}

</script>

</body>
</html>
