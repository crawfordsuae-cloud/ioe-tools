<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>IOE AI Retrofit Platform</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  background:linear-gradient(135deg,#020617,#0f172a);
  color:white;
  min-height:100vh;
  padding:40px;
}

.container{
  max-width:1400px;
  margin:auto;
}

.hero{
  margin-bottom:40px;
}

.hero h1{
  font-size:64px;
  margin-bottom:20px;
  background:linear-gradient(to right,#38bdf8,#2563eb);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.hero p{
  color:#94a3b8;
  font-size:20px;
}

.upload{
  background:rgba(255,255,255,0.05);
  border:2px dashed rgba(255,255,255,0.15);
  border-radius:24px;
  padding:50px;
  text-align:center;
  margin-top:40px;
}

.upload input{
  display:none;
}

.upload label{
  display:inline-block;
  padding:18px 40px;
  border-radius:14px;
  background:linear-gradient(to right,#2563eb,#0ea5e9);
  cursor:pointer;
  font-size:18px;
  font-weight:600;
}

.process-btn{
  margin-top:25px;
  padding:18px 50px;
  border:none;
  border-radius:14px;
  background:linear-gradient(to right,#06b6d4,#2563eb);
  color:white;
  font-size:18px;
  cursor:pointer;
}

.dashboard{
  margin-top:50px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
  gap:25px;
}

.card{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:20px;
  padding:30px;
}

.card h2{
  margin-bottom:20px;
}

.card p{
  margin-bottom:12px;
  color:#cbd5e1;
}

.measure{
  background:rgba(255,255,255,0.05);
  border-radius:14px;
  padding:20px;
  margin-bottom:15px;
}

.measure label{
  font-size:18px;
  font-weight:600;
}

.total{
  font-size:28px;
  color:#4ade80;
  margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

  <div class="hero">

    <h1>IOE AI Retrofit Platform</h1>

    <p>
      EPC • RdSAP • PAS2035 • Retrofit Calculations
    </p>

  </div>

  <div class="upload">

    <label>

      Upload PDF/DOCX

      <input type="file"
             id="fileInput"
             accept=".pdf,.docx">

    </label>

    <br>

    <button class="process-btn"
            onclick="processDocument()">

      Analyse Property

    </button>

  </div>

  <div class="dashboard"
       id="dashboard">

  </div>

</div>

<script>

let totalCost = 0;
let totalSap = 0;
let totalCarbon = 0;

async function processDocument(){

  document.getElementById("dashboard")
    .innerHTML = `
      <div class="card">
        <h2>Processing...</h2>
        <p>Loading property data...</p>
      </div>
    `;

  // REAL API CALL
  const response = await fetch(
    "https://script.google.com/macros/s/AKfycbwAW8iYFB5AGTr351Sl0O9067vVPxxM_4p3oyGbg3mbc8m07YXk44PSEJCfz5-CeKc6/exec"
  );

  const data = await response.json();

  let measuresHtml = "";

  data.measures.forEach(measure => {

    measuresHtml += `

      <div class="measure">

        <input type="checkbox"
               onchange="
                 calculateMeasure(
                   ${measure.cost},
                   ${measure.sap},
                   ${measure.carbon}
                 )
               ">

        <label>

          ${measure.name}

          (£${measure.cost})

        </label>

      </div>

    `;
  });

  document.getElementById("dashboard")
    .innerHTML = `

      <div class="card">

        <h2>Property Details</h2>

        <p>Address: ${data.address}</p>

        <p>Floor Area: ${data.floorArea}</p>

        <p>EPC Rating: ${data.currentRating}</p>

        <p>Walls: ${data.walls}</p>

        <p>Roof: ${data.roof}</p>

        <p>Heating: ${data.heating}</p>

      </div>

      <div class="card">

        <h2>Recommended Measures</h2>

        ${measuresHtml}

      </div>

      <div class="card">

        <h2>Retrofit Calculation</h2>

        <div id="calcResults">

          Select measures to calculate.

        </div>

      </div>

    `;
}

function calculateMeasure(
  cost,
  sap,
  carbon
){

  totalCost += cost;
  totalSap += sap;
  totalCarbon += carbon;

  document.getElementById(
    "calcResults"
  ).innerHTML = `

    <p>
      SAP Improvement:
      +${totalSap}
    </p>

    <p>
      Carbon Reduction:
      ${totalCarbon.toFixed(1)}
      tonnes CO₂
    </p>

    <div class="total">

      Total Cost:
      £${totalCost.toLocaleString()}

    </div>

  `;
}

</script>

</body>
</html>
