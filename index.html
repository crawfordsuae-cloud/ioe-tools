```html
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>IOE AI Energy Platform</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  font-family:'Inter',sans-serif;

  background:
    linear-gradient(
      135deg,
      #0f172a,
      #111827
    );

  color:white;

  min-height:100vh;

  padding:40px;
}

.container{

  max-width:1200px;

  margin:auto;
}

.hero{

  margin-bottom:40px;
}

.hero h1{

  font-size:64px;

  font-weight:700;

  margin-bottom:20px;

  background:
    linear-gradient(
      to right,
      #60a5fa,
      #38bdf8
    );

  -webkit-background-clip:text;

  -webkit-text-fill-color:transparent;
}

.hero p{

  color:#94a3b8;

  font-size:20px;
}

.upload-box{

  margin-top:40px;

  background:
    rgba(255,255,255,0.05);

  border:
    2px dashed rgba(255,255,255,0.15);

  border-radius:24px;

  padding:60px;

  text-align:center;

  backdrop-filter:blur(12px);

  transition:0.3s;
}

.upload-box:hover{

  border-color:#38bdf8;
}

.upload-box input{

  display:none;
}

.upload-label{

  display:inline-block;

  padding:18px 40px;

  background:
    linear-gradient(
      to right,
      #2563eb,
      #0ea5e9
    );

  border-radius:14px;

  cursor:pointer;

  font-weight:600;

  font-size:18px;

  transition:0.3s;
}

.upload-label:hover{

  transform:translateY(-2px);
}

.file-name{

  margin-top:20px;

  color:#cbd5e1;
}

.process-btn{

  margin-top:30px;

  padding:18px 50px;

  border:none;

  border-radius:14px;

  background:
    linear-gradient(
      to right,
      #06b6d4,
      #2563eb
    );

  color:white;

  font-size:18px;

  font-weight:600;

  cursor:pointer;

  transition:0.3s;
}

.process-btn:hover{

  transform:translateY(-3px);
}

.results{

  margin-top:50px;

  display:grid;

  grid-template-columns:
    repeat(auto-fit,minmax(320px,1fr));

  gap:25px;
}

.card{

  background:
    rgba(255,255,255,0.06);

  border:
    1px solid rgba(255,255,255,0.08);

  border-radius:20px;

  padding:30px;

  backdrop-filter:blur(10px);

  transition:0.3s;
}

.card:hover{

  transform:translateY(-4px);
}

.card h2{

  margin-bottom:20px;

  font-size:24px;
}

.card p{

  color:#cbd5e1;

  margin-bottom:12px;

  line-height:1.6;
}

.loading{

  margin-top:40px;

  font-size:22px;

  color:#38bdf8;
}

.success{

  color:#4ade80;
}

</style>

</head>

<body>

<div class="container">

  <div class="hero">

    <h1>IOE AI Platform</h1>

    <p>
      Upload EPC, RdSAP, PAS2035 or retrofit assessment documents.
    </p>

  </div>

  <div class="upload-box">

    <label class="upload-label">

      Select PDF or DOCX

      <input type="file"
             id="docxFile"
             accept=".pdf,.docx"
             onchange="showFileName()">

    </label>

    <div class="file-name"
         id="fileName">
      No file selected
    </div>

    <button class="process-btn"
            onclick="processDoc()">

      Process Assessment

    </button>

  </div>

  <div id="results"
       class="results"></div>

</div>

<!-- DOCX -->
<script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>

<!-- PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<script>

function showFileName(){

  const file =
    document.getElementById('docxFile').files[0];

  document.getElementById('fileName')
    .innerText = file
      ? file.name
      : "No file selected";
}

async function processDoc(){

  const file =
    document.getElementById('docxFile').files[0];

  if(!file){

    alert("Select a file");

    return;
  }

  document.getElementById('results').innerHTML =
    `
      <div class="loading">
        Processing assessment...
      </div>
    `;

  try{

    let text = "";

    // PDF
    if(file.type === "application/pdf"){

      const arrayBuffer =
        await file.arrayBuffer();

      const pdf =
        await pdfjsLib.getDocument({
          data: arrayBuffer
        }).promise;

      for(let pageNum = 1;
          pageNum <= pdf.numPages;
          pageNum++){

        const page =
          await pdf.getPage(pageNum);

        const content =
          await page.getTextContent();

        const strings =
          content.items.map(
            item => item.str
          );

        text += strings.join(" ");
      }

    }

    // DOCX
    else{

      const arrayBuffer =
        await file.arrayBuffer();

      const result =
        await mammoth.extractRawText({
          arrayBuffer: arrayBuffer
        });

      text = result.value;
    }

    // SEND TO GOOGLE SCRIPT
    await fetch(
      "https://script.google.com/macros/s/AKfycbwAW8iYFB5AGTr351Sl0O9067vVPxxM_4p3oyGbg3mbc8m07YXk44PSEJCfz5-CeKc6/exec",
      {
        method:"POST",

        mode:"no-cors",

        headers:{
          "Content-Type":"application/json"
        },

        body:JSON.stringify({
          text:text
        })
      }
    );

    // MODERN RESULT UI
    document.getElementById('results').innerHTML =

      `

      <div class="card">

        <h2>Assessment Uploaded</h2>

        <p class="success">
          Document processed successfully.
        </p>

        <p>
          PDF/DOCX extracted and sent
          to the AI assessment engine.
        </p>

      </div>

      <div class="card">

        <h2>AI Extraction</h2>

        <p>
          Address detected
        </p>

        <p>
          Floor area detected
        </p>

        <p>
          Energy assessment parsed
        </p>

      </div>

      <div class="card">

        <h2>Retrofit Engine</h2>

        <p>
          Improvement calculations started
        </p>

        <p>
          PAS2035 workflow active
        </p>

      </div>

      `;

  }catch(err){

    document.getElementById('results').innerHTML =

      `
        <div class="card">

          <h2>Error</h2>

          <p>
            ${err}
          </p>

        </div>
      `;
  }
}

</script>

</body>
</html>
```
