<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>IOE Retrofit Platform</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  background:linear-gradient(135deg,#020617,#020617,#0f172a);
  color:white;
  min-height:100vh;
  padding:40px;
}

.container{
  max-width:1500px;
  margin:auto;
}

.hero{
  margin-bottom:40px;
}

.hero h1{
  font-size:72px;
  margin-bottom:20px;
  background:linear-gradient(to right,#38bdf8,#2563eb);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.hero p{
  color:#94a3b8;
  font-size:22px;
}

.upload-box{

  background:rgba(255,255,255,0.05);

  border:1px solid rgba(255,255,255,0.08);

  border-radius:28px;

  padding:60px;

  text-align:center;
}

.upload-box input{
  display:none;
}

.upload-btn{

  display:inline-block;

  padding:20px 45px;

  border-radius:16px;

  background:linear-gradient(to right,#2563eb,#0ea5e9);

  font-size:18px;

  font-weight:600;

  cursor:pointer;
}

.process-btn{

  margin-top:25px;

  padding:20px 50px;

  border:none;

  border-radius:16px;

  background:linear-gradient(to right,#06b6d4,#2563eb);

  color:white;

  font-size:18px;

  cursor:pointer;
}

.dashboard{

  margin-top:40px;

  display:grid;

  grid-template-columns:
  repeat(auto-fit,minmax(420px,1fr));

  gap:30px;
}

.card{

  background:rgba(255,255,255,0.05);

  border:1px solid rgba(255,255,255,0.08);

  border-radius:24px;

  padding:35px;
}

.card h2{

  margin-bottom:25px;

  font-size:38px;
}

.card p{

  margin-bottom:14px;

  color:#cbd5e1;

  font-size:20px;
}

.measure{

  background:rgba(255,255,255,0.04);

  border-radius:18px;

  padding:25px;

  margin-bottom:18px;
}

.measure label{

  font-size:22px;

  font-weight:700;
}

.additional{

  margin-top:15px;

  color:#93c5fd;

  line-height:1.7;
}

.total{

  font-size:42px;

  color:#4ade80;

  margin-top:20px;

  font-weight:700;
}

.loading{

  font-size:24px;

  color:#38bdf8;
}

</style>

</head>

<body>

<div class="container">

  <div class="hero">

    <h1>IOE Retrofit Platform</h1>

    <p>
      RdSAP • PAS2035 • Retrofit Assessment
    </p>

  </div>

  <div class="upload-box">

    <label class="upload-btn">

      Upload EPC PDF/DOCX

      <input type="file"
             id="fileInput"
             accept=".pdf,.docx">

    </label>

    <br>

    <button class="process-btn"
            onclick="processDocument()">

      Analyse Property

    </button>

  </div>

  <div class="dashboard"
       id="dashboard">

  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<script src="https://unpkg.com/mammoth/mammoth.browser.min.js"></script>

<script>

let totalCost = 0;

async function processDocument(){

  const file =
    document.getElementById(
      "fileInput"
    ).files[0];

  if(!file){

    alert("Please upload a file");

    return;
  }

  document.getElementById(
    "dashboard"
  ).innerHTML = `

    <div class="card">

      <h2>Processing...</h2>

      <p class="loading">

        Extracting EPC/RdSAP data...

      </p>

    </div>

  `;

  let text = "";

  // PDF
  if(file.type === "application/pdf"){

    const arrayBuffer =
      await file.arrayBuffer();

    const pdf =
      await pdfjsLib.getDocument({
        data: arrayBuffer
      }).promise;

    for(
      let pageNum = 1;
      pageNum <= pdf.numPages;
      pageNum++
    ){

      const page =
        await pdf.getPage(pageNum);

      const content =
        await page.getTextContent();

      const strings =
        content.items.map(
          item => item.str
        );

      text += strings.join(" ");
    }

  }

  // DOCX
  else{

    const arrayBuffer =
      await file.arrayBuffer();

    const result =
      await mammoth.extractRawText({
        arrayBuffer:arrayBuffer
      });

    text = result.value;
  }

  try{

    const response = await fetch(

      "https://script.google.com/macros/s/AKfycbwAW8iYFB5AGTr351Sl0O9067vVPxxM_4p3oyGbg3mbc8m07YXk44PSEJCfz5-CeKc6/exec",

      {
        method:"POST",

        headers:{
          "Content-Type":"application/json"
        },

        body:JSON.stringify({
          text:text
        })
      }
    );

    const data =
      await response.json();

    document.title =
      data.address || "IOE Retrofit Platform";

    let measuresHtml = "";

    data.measures.forEach(measure => {

      measuresHtml += `

        <div class="measure">

          <input type="checkbox"

                 onchange="
                   calculateCost(
                     ${measure.cost}
                   )
                 ">

          <label>

            ${measure.name}

            (£${Number(measure.cost).toLocaleString()})

          </label>

          <div class="additional">

            ${measure.risk}

            <br><br>

            ${measure.additional.join(", ")}

          </div>

        </div>

      `;
    });

    document.getElementById(
      "dashboard"
    ).innerHTML = `

      <div class="card">

        <h2>Property Information</h2>

        <p><strong>Address:</strong> ${data.address}</p>

        <p><strong>Total Floor Area:</strong> ${data.totalFloorArea}</p>

        <p><strong>Heat Loss Perimeter:</strong> ${data.heatLossPerimeter}</p>

        <p><strong>Roof Area:</strong> ${data.roofArea}</p>

        <p><strong>Window Area:</strong> ${data.windowArea}</p>

        <p><strong>Room Height:</strong> ${data.roomHeight}</p>

        <p><strong>Party Wall Perimeter:</strong> ${data.partyWallPerimeter}</p>

        <p><strong>Flat Roof Area:</strong> ${data.flatRoofArea}</p>

        <p><strong>Number Of Doors:</strong> ${data.numberDoors}</p>

        <p><strong>Current Rating:</strong> ${data.currentRating}</p>

      </div>

      <div class="card">

        <h2>Recommended Measures</h2>

        ${measuresHtml}

      </div>

      <div class="card">

        <h2>Total Installation Cost</h2>

        <div id="totalCost">

          <div class="total">

            £0

          </div>

        </div>

      </div>

    `;

  }catch(error){

    document.getElementById(
      "dashboard"
    ).innerHTML = `

      <div class="card">

        <h2>Backend Error</h2>

        <p>

          ${error}

        </p>

      </div>

    `;
  }

}

function calculateCost(cost){

  totalCost += Number(cost);

  document.getElementById(
    "totalCost"
  ).innerHTML = `

    <div class="total">

      £${totalCost.toLocaleString()}

    </div>

  `;
}

</script>

</body>
</html>
