<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IOE Energy Assessment Tool</title>

<style>

body{

  margin:0;
  padding:40px;

  background:#050816;

  color:white;

  font-family:Arial,sans-serif;
}

.container{

  max-width:1400px;

  margin:auto;
}

h1{

  font-size:52px;

  margin-bottom:10px;

  color:#ffffff;
}

.subtitle{

  color:#9aa4bf;

  margin-bottom:40px;

  font-size:20px;
}

.upload-box{

  background:#11182d;

  border:1px solid #1f2b4d;

  border-radius:20px;

  padding:40px;

  margin-bottom:40px;
}

input[type=file]{

  margin-top:20px;

  color:white;
}

button{

  margin-top:20px;

  background:#2563eb;

  color:white;

  border:none;

  padding:16px 30px;

  border-radius:12px;

  font-size:18px;

  cursor:pointer;
}

button:hover{

  background:#1d4ed8;
}

.grid{

  display:grid;

  grid-template-columns:1fr 1fr;

  gap:30px;
}

.card{

  background:#11182d;

  border:1px solid #1f2b4d;

  border-radius:20px;

  padding:30px;
}

.card h2{

  margin-top:0;

  font-size:34px;
}

.measure{

  background:#1a2442;

  padding:20px;

  border-radius:16px;

  margin-bottom:20px;
}

.measure h3{

  margin-top:0;
}

.loading{

  font-size:22px;

  color:#60a5fa;
}

.error{

  color:red;

  font-size:20px;
}

</style>

</head>

<body>

<div class="container">

<h1>IOE Energy Assessment Tool</h1>

<p class="subtitle">

Upload Existing RdSAP Summary Worksheet or PAS2035 Assessment

</p>

<div class="upload-box">

<input type="file" id="fileInput">

<br>

<button onclick="uploadDocument()">

Process Document

</button>

</div>

<div id="results"></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

<script>

async function uploadDocument(){

  const file =
    document.getElementById(
      "fileInput"
    ).files[0];

  if(!file){

    alert("Select a PDF file");

    return;
  }

  document.getElementById(
    "results"
  ).innerHTML = `

    <div class="card">

      <h2>Processing...</h2>

      <p class="loading">

        Extracting RdSAP data

      </p>

    </div>

  `;

  try{

    const arrayBuffer =
      await file.arrayBuffer();

    const pdf =
      await pdfjsLib.getDocument({
        data:arrayBuffer
      }).promise;

    let extractedText = "";

    for(let pageNum = 1;
        pageNum <= pdf.numPages;
        pageNum++){

      const page =
        await pdf.getPage(pageNum);

      const content =
        await page.getTextContent();

      const strings =
        content.items.map(
          item => item.str
        );

      extractedText +=
        strings.join(" ");

    }

    processDocument(
      extractedText
    );

  }

  catch(error){

    document.getElementById(
      "results"
    ).innerHTML = `

      <div class="card">

        <h2>Error</h2>

        <p class="error">

          ${error}

        </p>

      </div>

    `;
  }
}

async function processDocument(extractedText){

  try{

    const response =
      await fetch(
        "https://holy-base-2564.crawfordsuae.workers.dev",
        {

          method:"POST",

          headers:{
            "Content-Type":"application/json"
          },

          body:JSON.stringify({

            text:extractedText

          })

        }
      );

    const data =
      await response.json();

    document.getElementById(
      "results"
    ).innerHTML = `

      <div class="grid">

        <div class="card">

          <h2>Property Details</h2>

          <p>
          <strong>Address:</strong>
          ${data.address || "Not Found"}
          </p>

          <p>
          <strong>Total Floor Area:</strong>
          ${data.totalFloorArea || "0"} m²
          </p>

          <p>
          <strong>Heat Loss Perimeter:</strong>
          ${data.heatLossPerimeter || "0"} m
          </p>

          <p>
          <strong>Room Height:</strong>
          ${data.roomHeight || "0"} m
          </p>

        </div>

        <div class="card">

          <h2>Recommended Measures</h2>

          ${
            data.measures.map(
              measure => `

              <div class="measure">

                <h3>${measure.name}</h3>

                <p>
                Installation Cost:
                £${measure.cost}
                </p>

                <p>
                ${measure.risk}
                </p>

                <p>
                Additional:
                ${measure.additional.join(", ")}
                </p>

              </div>

            `
            ).join("")
          }

        </div>

      </div>

    `;

  }

  catch(error){

    document.getElementById(
      "results"
    ).innerHTML = `

      <div class="card">

        <h2>Backend Error</h2>

        <p class="error">

          ${error}

        </p>

      </div>

    `;
  }
}

</script>

</body>

</html>
